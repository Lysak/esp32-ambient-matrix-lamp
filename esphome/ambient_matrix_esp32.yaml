substitutions:
  device_name: ambient-matrix-lamp
  friendly_name: Ambient Matrix Lamp
  debug_package: !secret debug_package
  matrix_flip_x: "false"  # set to "true" if the matrix is mirrored left/right
  matrix_flip_y: "true"   # set to "true" if the matrix is mounted upside down
  led_pin: GPIO25   # WS2812B DATA: ESP32 GPIO25 → 470 Ω → LED DIN
  touch_pin: GPIO27 # TTP223 OUT:   ESP32 GPIO27
  i2c_sda: GPIO21   # BH1750 SDA:   ESP32 GPIO21 (I²C default)
  i2c_scl: GPIO22   # BH1750 SCL:   ESP32 GPIO22 (I²C default)
  # INMP441 I²S microphone (integer GPIO numbers required by ESP-IDF I²S driver)
  mic_sck: "32"     # INMP441 SCK:  ESP32 GPIO32
  mic_ws: "33"      # INMP441 WS:   ESP32 GPIO33
  mic_sd: "34"      # INMP441 SD:   ESP32 GPIO34 (input-only GPIO)
  # L/R pin → GND (selects left channel / address 0)
  # MAX98357A I²S speaker amplifier
  spk_lrclk: GPIO13 # MAX98357A LRC:  ESP32 GPIO13
  spk_bclk: GPIO26  # MAX98357A BCLK: ESP32 GPIO26
  spk_dout: GPIO14  # MAX98357A DIN:  ESP32 GPIO14

packages:
  board: !include boards/esp32-cp2102.yaml
  base: !include common/base.yaml
  led: !include common/led_matrix.yaml
  debug: !include ${debug_package}
  # light_sensor: !include common/light_sensor.yaml  # BH1750
  # mic: !include common/microphone.yaml             # INMP441
  # audio: !include common/audio.yaml                # MAX98357A

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  includes:
    - custom/adapter.h
    - custom/power_transition.h
    - custom/sunrise_renderer.h
    - custom/effect_prefs.h
  libraries:
    - effects-core
  platformio_options:
    lib_extra_dirs: !secret project_root
  # Auto-start on power-up without Home Assistant: restore the saved brightness
  # level within the hard 33% global power ceiling.
  on_boot:
    priority: -100
    then:
      - lambda: |-
          effect_prefs_load(id(current_effect).c_str());
          id(effect_speed).publish_state((float)g_effect_speed);
          id(effect_scale).publish_state((float)g_effect_scale);
      - script.execute: run_power_on_transition
