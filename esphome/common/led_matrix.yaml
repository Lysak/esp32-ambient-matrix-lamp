globals:
  # Master power flag, independent from the light's effect — mirrors
  # GyverLamp2's separate "power" vs "preset index" fields, so toggling
  # power never resets the selected effect.
  - id: lamp_powered
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: last_toggle_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: current_effect
    type: std::string
    restore_value: false
    initial_value: '"Rainbow"'

switch:
  - platform: template
    id: lamp_power
    name: "Lamp Power"
    lambda: |-
      return id(lamp_powered);
    turn_on_action:
      - lambda: |-
          static const uint32_t DEBOUNCE_MS = 1000;
          uint32_t now = millis();
          if (now - id(last_toggle_ms) < DEBOUNCE_MS) return;
          id(last_toggle_ms) = now;
          id(lamp_powered) = true;
    turn_off_action:
      - lambda: |-
          static const uint32_t DEBOUNCE_MS = 1000;
          uint32_t now = millis();
          if (now - id(last_toggle_ms) < DEBOUNCE_MS) return;
          id(last_toggle_ms) = now;
          id(lamp_powered) = false;

select:
  - platform: template
    id: lamp_effect
    name: "Lamp Effect"
    options:
      - "Rainbow"
      - "Color"
      - "Color Shift"
      - "Gradient"
      - "Perlin"
      - "Particles"
      - "Fire"
      - "Fire 2020"
      - "Confetti"
      - "Tornado"
    lambda: |-
      return id(current_effect);
    set_action:
      - lambda: |-
          id(current_effect) = x;
      - light.turn_on:
          id: led_matrix
          effect: !lambda return x;

number:
  - platform: template
    id: lamp_brightness
    name: "Lamp Brightness"
    min_value: 1
    max_value: 255
    step: 1
    lambda: |-
      return (int)(id(led_matrix).current_values.get_brightness() * 255.0f);
    set_action:
      - light.turn_on:
          id: led_matrix
          brightness: !lambda return x / 255.0f;

light:
  - platform: esp32_rmt_led_strip
    id: led_matrix
    name: "Ambient Matrix Lamp"
    internal: true
    pin: ${led_pin}
    num_leds: 256
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
    # Hard current cap: strip max is ~15.36A (256 LEDs x 60mA @ full white),
    # PSU is 5V 12A. Cap to ~5A regardless of HA brightness slider.
    color_correct: [0.32, 0.32, 0.32]
    effects:
      - addressable_lambda:
          name: "Rainbow"
          update_interval: 30ms
          lambda: |-
            if (!id(lamp_powered)) { ESPHomeMatrixCanvas(it).clear(); return; }
            static ambient_matrix::EffectEngine engine{ambient_matrix::Matrix(16, 16)};
            if (initial_run) engine.set_effect(ambient_matrix::EffectId::Rainbow);
            ESPHomeMatrixCanvas canvas(it);
            engine.tick(canvas, millis());

      - addressable_lambda:
          name: "Color"
          update_interval: 30ms
          lambda: |-
            if (!id(lamp_powered)) { ESPHomeMatrixCanvas(it).clear(); return; }
