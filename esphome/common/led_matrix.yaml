time:
  - platform: homeassistant
    id: homeassistant_time
    on_time_sync:
      then:
        - script.execute: check_sunrise_schedule
    on_time:
      - seconds: 0
        then:
          - script.execute: check_sunrise_schedule

# Rotate forever while the lamp is on by reusing the same next-effect script.
interval:
  - interval: 1min
    then:
      - if:
          condition:
            lambda: return id(lamp_powered) && id(lamp_auto_rotate).state;
          then:
            - script.execute: button_next_effect
  - interval: 1s
    then:
      - if:
          condition:
            lambda: |-
              if (!id(sunrise_active)) return false;
              const uint32_t total = id(sunrise_ramp_duration_ms) + id(sunrise_hold_duration_ms);
              return millis() - id(sunrise_started_ms) >= total;
          then:
            - script.execute: stop_sunrise

