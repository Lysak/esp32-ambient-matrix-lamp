globals:
  # Master power flag, independent from the light's effect — mirrors
  # GyverLamp2's separate "power" vs "preset index" fields, so toggling
  # power never resets the selected effect.
  - id: lamp_powered
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: last_toggle_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: current_effect
    type: std::string
    restore_value: true
    initial_value: '"Color"'
  - id: click_count
    type: uint8_t
    restore_value: false
    initial_value: '0'
  - id: touch_long_press
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: single_tap_advanced
    type: bool
    restore_value: false
    initial_value: 'false'
  # Persisted so ramp direction survives reboot.
  - id: brightness_up
    type: bool
    restore_value: true
    initial_value: 'true'
  - id: lamp_brightness_level
    type: int
    restore_value: true
    initial_value: '8'
  - id: power_transition_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: power_transition_turning_on
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: power_transition_start_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: power_transition_duration_ms
    type: uint32_t
    restore_value: false
    initial_value: '900'
  - id: sunrise_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: sunrise_start_pending
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: sunrise_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: sunrise_ramp_duration_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: sunrise_hold_duration_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: sunrise_duration_min
    type: int
    restore_value: true
    initial_value: '20'
  - id: sunrise_hold_min
    type: int
    restore_value: true
    initial_value: '10'
  - id: sunrise_max_level
    type: int
    restore_value: true
    initial_value: '10'

switch:
  - platform: template
    id: lamp_power
    name: "Lamp Power"
    lambda: |-
      return id(lamp_powered);
    turn_on_action:
      - if:
          condition:
            lambda: return id(sunrise_active);
          then:
            - lambda: |-
                id(sunrise_active) = false;
                id(power_transition_active) = false;
                id(lamp_powered) = true;
            - light.turn_on:
                id: led_matrix
                brightness: !lambda return ((float) id(lamp_brightness_level)) / 10.0f;
                effect: !lambda return id(current_effect);
          else:
            - if:
                condition:
                  lambda: return millis() - id(last_toggle_ms) >= 1000;
                then:
                  - script.execute: run_power_on_transition
    turn_off_action:
      - if:
          condition:
            lambda: return millis() - id(last_toggle_ms) >= 1000;
          then:
            - if:
                condition:
                  lambda: return id(sunrise_active);
                then:
                  - script.execute: stop_sunrise
                else:
                  - script.execute: run_power_off_transition
  - platform: template
    id: lamp_auto_rotate
    name: "Lamp Auto Rotate"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_sunday_enabled
    name: "Sunrise Sunday"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_monday_enabled
    name: "Sunrise Monday"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_tuesday_enabled
    name: "Sunrise Tuesday"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_wednesday_enabled
    name: "Sunrise Wednesday"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_thursday_enabled
    name: "Sunrise Thursday"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_friday_enabled
    name: "Sunrise Friday"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_saturday_enabled
    name: "Sunrise Saturday"
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true

