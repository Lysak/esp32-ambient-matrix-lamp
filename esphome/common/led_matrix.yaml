      - lambda: |-
          g_effect_palette = effect_palette_id(x);
          effect_prefs_save(id(current_effect).c_str(),
                            g_effect_speed,
                            g_effect_scale,
                            g_effect_color,
                            g_effect_palette,
                            g_effect_from_palette);
          id(effect_palette).publish_state(x);

number:
