          preset_prefs_save(id(current_preset).c_str(), g_effect_speed, g_effect_scale, g_effect_palette);
          id(effect_scale).publish_state((float)g_effect_scale);

  - platform: template
    id: btn_reset_defaults
    name: "Reset to Defaults"
    on_press:
      - lambda: |-
          const Preset* p = find_preset(id(current_preset).c_str());
          if (!p) return;
          g_effect_speed   = p->speed;
          g_effect_scale   = p->scale;
          g_effect_palette = p->palette;
          preset_prefs_save(id(current_preset).c_str(), g_effect_speed, g_effect_scale, g_effect_palette);
          id(effect_speed).publish_state((float)g_effect_speed);
          id(effect_scale).publish_state((float)g_effect_scale);
          id(effect_palette).publish_state((float)g_effect_palette);

  # Exposed to Home Assistant. An automation presses this when the
  # agent-status bridge fires an `agent_session_finished` event.
  - platform: template
    id: btn_agent_finished_flash
    name: "Agent Finished Flash"
    on_press:
      - script.execute: agent_finished_flash

# Multi-click dispatcher: each new tap resets the 800 ms window. Sunrise is
# schedule-driven only and does not start from the touch button.
script:
  # Green "agent finished" notification: blink green a few times, then restore
  # whatever effect and power state the lamp had before. mode: restart so a new
  # finish while already blinking restarts cleanly without overlapping.
  - id: agent_finished_flash
    mode: restart
    then:
      - lambda: |-
          if (!id(notify_flash_active)) {
            id(notify_flash_active) = true;
            id(notify_flash_prev_effect) = id(current_effect);
            id(notify_flash_prev_powered) = id(lamp_powered);
          }
          id(lamp_powered) = true;
      - repeat:
          count: 3
          then:
            - light.turn_on:
                id: led_matrix
                red: 0%
                green: 100%
                blue: 0%
                # Follow the lamp's current brightness level, like every other
                # effect, so the flash never looks brighter than the lamp.
                brightness: !lambda return lamp_brightness_fraction(id(lamp_brightness_level));
                effect: "None"
            - delay: 350ms
            - light.turn_off:
                id: led_matrix
            - delay: 250ms
      - lambda: |-
          id(lamp_powered) = id(notify_flash_prev_powered);
          id(current_effect) = id(notify_flash_prev_effect);
          id(notify_flash_active) = false;
      - if:
          condition:
            lambda: 'return id(notify_flash_prev_powered);'
          then:
            - light.turn_on:
                id: led_matrix
                effect: !lambda 'return id(notify_flash_prev_effect);'
          else:
            - light.turn_off:
                id: led_matrix

  - id: check_sunrise_schedule
    mode: restart
    then:
      - lambda: |-
          id(sunrise_start_pending) = false;
          auto now = id(homeassistant_time).now();
          if (!now.is_valid()) return;
          if (id(sunrise_active) || id(lamp_powered) || id(power_transition_active)) return;

          struct DayConfig {
            bool enabled;
            int hour;
            int minute;
          };

          auto get_day_config = [&](uint8_t day) -> DayConfig {
            switch (day) {
              case 1: return {id(sunrise_sunday_enabled).state, (int) id(sunrise_sunday_hour).state, (int) id(sunrise_sunday_minute).state};
              case 2: return {id(sunrise_monday_enabled).state, (int) id(sunrise_monday_hour).state, (int) id(sunrise_monday_minute).state};
              case 3: return {id(sunrise_tuesday_enabled).state, (int) id(sunrise_tuesday_hour).state, (int) id(sunrise_tuesday_minute).state};
              case 4: return {id(sunrise_wednesday_enabled).state, (int) id(sunrise_wednesday_hour).state, (int) id(sunrise_wednesday_minute).state};
              case 5: return {id(sunrise_thursday_enabled).state, (int) id(sunrise_thursday_hour).state, (int) id(sunrise_thursday_minute).state};
              case 6: return {id(sunrise_friday_enabled).state, (int) id(sunrise_friday_hour).state, (int) id(sunrise_friday_minute).state};
              case 7: return {id(sunrise_saturday_enabled).state, (int) id(sunrise_saturday_hour).state, (int) id(sunrise_saturday_minute).state};
              default: return {false, 0, 0};
            }
          };

          const int current_minutes = now.hour * 60 + now.minute;
          const int sunrise_minutes = id(sunrise_duration_min);

          auto should_start_for = [&](DayConfig cfg, bool wrapped_from_previous_day) -> bool {
            if (!cfg.enabled) return false;
            const int alarm_minutes = cfg.hour * 60 + cfg.minute;
            int start_minutes = alarm_minutes - sunrise_minutes;
            if (start_minutes < 0) start_minutes += 1440;
            const bool wraps_midnight = start_minutes > alarm_minutes;
            if (wrapped_from_previous_day != wraps_midnight) return false;
            return current_minutes == start_minutes;
          };

          bool should_start = should_start_for(get_day_config(now.day_of_week), false);
          if (!should_start) {
            uint8_t next_day = now.day_of_week + 1;
            if (next_day > 7) next_day = 1;
            should_start = should_start_for(get_day_config(next_day), true);
          }
          if (!should_start) return;
          id(sunrise_start_pending) = true;
      - if:
          condition:
            lambda: return id(sunrise_start_pending);
          then:
            - script.execute: start_sunrise

  - id: start_sunrise
    mode: restart
    then:
      - lambda: |-
          id(sunrise_start_pending) = false;
          id(power_transition_active) = false;
          id(sunrise_active) = true;
          id(sunrise_started_ms) = millis();
          id(sunrise_ramp_duration_ms) = (uint32_t) id(sunrise_duration_min) * 60000UL;
          id(sunrise_hold_duration_ms) = (uint32_t) id(sunrise_hold_min) * 60000UL;
      - light.turn_on:
          id: led_matrix
          brightness: 100%
          effect: "Sunrise"

  - id: stop_sunrise
    mode: restart
    then:
      - lambda: |-
          id(sunrise_active) = false;
          id(power_transition_active) = false;
      - light.turn_off: led_matrix

  - id: apply_effect_speed_debounced
    mode: restart
    then:
      - delay: 500ms
      - lambda: |-
          if (millis() - id(effect_speed_change_ms) < 500) return;
          if (id(effect_speed_target_effect) != id(current_effect)) return;
          g_effect_speed = id(effect_speed_pending);
          preset_prefs_save(id(current_preset).c_str(),
                            g_effect_speed,
                            g_effect_scale,
                            g_effect_palette);
          id(effect_speed).publish_state((float)g_effect_speed);

  - id: apply_effect_scale_debounced
    mode: restart
    then:
      - delay: 500ms
      - lambda: |-
          if (millis() - id(effect_scale_change_ms) < 500) return;
          if (id(effect_scale_target_effect) != id(current_effect)) return;
          g_effect_scale = id(effect_scale_pending);
          preset_prefs_save(id(current_preset).c_str(),
                            g_effect_speed,
                            g_effect_scale,
                            g_effect_palette);
          id(effect_scale).publish_state((float)g_effect_scale);

  - id: run_power_on_transition
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          id(last_toggle_ms) = now;
          id(lamp_powered) = true;
          id(power_transition_active) = true;
          id(power_transition_turning_on) = true;
          id(power_transition_start_ms) = now;
      - light.turn_on:
          id: led_matrix
          brightness: !lambda return lamp_brightness_fraction(id(lamp_brightness_level));
          effect: "On/Off: Power Helix"
      - delay: 900ms
      - if:
          condition:
            lambda: return id(lamp_powered) && id(power_transition_active) && id(power_transition_turning_on);
          then:
            - lambda: id(power_transition_active) = false;
            - light.turn_on:
                id: led_matrix
                brightness: !lambda return lamp_brightness_fraction(id(lamp_brightness_level));
                effect: !lambda return id(current_effect);

  - id: run_power_off_transition
    mode: restart
    then:
      - lambda: |-
          const uint32_t now = millis();
          id(last_toggle_ms) = now;
          id(power_transition_active) = true;
          id(power_transition_turning_on) = false;
          id(power_transition_start_ms) = now;
      - light.turn_on:
          id: led_matrix
          brightness: !lambda return lamp_brightness_fraction(id(lamp_brightness_level));
          effect: "On/Off: Power Helix"
      - delay: 900ms
      - lambda: |-
          id(power_transition_active) = false;
          id(lamp_powered) = false;

  - id: button_next_effect
    mode: restart
    then:
      - lambda: |-
          static const char *const effects[] = {
              "Color (Original)", "Color Shift (Original)", "Gradient (Original)",
              "Perlin (Original)", "Particles (Original)", "Fire Classic",
              "Fire (Original)", "Confetti (Original)", "Tornado (Original)",
          };
          constexpr size_t effect_count = sizeof(effects) / sizeof(effects[0]);
          size_t index = 0;
          for (size_t i = 0; i < effect_count; i++) {
            if (id(current_effect) == effects[i]) {
              index = i;
              break;
            }
          }
          index = (index + 1) % effect_count;
          id(current_effect) = effects[index];
          effect_prefs_load(effects[index]);
          id(effect_speed).publish_state((float) g_effect_speed);
          id(effect_scale).publish_state((float) g_effect_scale);
          id(effect_color).publish_state((float) g_effect_color);
          id(effect_palette).publish_state((float) g_effect_palette);
          id(effect_from_palette).publish_state(g_effect_from_palette != 0);
          id(lamp_effect).publish_state(id(current_effect));
      - if:
          condition:
            lambda: return id(lamp_powered);
          then:
            - light.turn_on:
                id: led_matrix
                effect: !lambda return id(current_effect);

  - id: button_previous_effect
    mode: restart
    then:
      - lambda: |-
          static const char *const effects[] = {
              "Color (Original)", "Color Shift (Original)", "Gradient (Original)",
              "Perlin (Original)", "Particles (Original)", "Fire Classic",
              "Fire (Original)", "Confetti (Original)", "Tornado (Original)",
          };
          constexpr size_t effect_count = sizeof(effects) / sizeof(effects[0]);
          size_t index = 0;
          for (size_t i = 0; i < effect_count; i++) {
            if (id(current_effect) == effects[i]) {
              index = i;
              break;
            }
          }
          index = (index + effect_count - 1) % effect_count;
          id(current_effect) = effects[index];
          effect_prefs_load(effects[index]);
          id(effect_speed).publish_state((float) g_effect_speed);
          id(effect_scale).publish_state((float) g_effect_scale);
          id(effect_color).publish_state((float) g_effect_color);
          id(effect_palette).publish_state((float) g_effect_palette);
          id(effect_from_palette).publish_state(g_effect_from_palette != 0);
          id(lamp_effect).publish_state(id(current_effect));
      - if:
          condition:
            lambda: return id(lamp_powered);
          then:
            - light.turn_on:
                id: led_matrix
                effect: !lambda return id(current_effect);

  - id: button_first_effect
    mode: restart
    then:
      - lambda: |-
          id(current_effect) = "Color (Original)";
          effect_prefs_load("Color (Original)");
          id(effect_speed).publish_state((float) g_effect_speed);
          id(effect_scale).publish_state((float) g_effect_scale);
          id(effect_color).publish_state((float) g_effect_color);
          id(effect_palette).publish_state((float) g_effect_palette);
          id(effect_from_palette).publish_state(g_effect_from_palette != 0);
          id(lamp_effect).publish_state(id(current_effect));
      - if:
          condition:
            lambda: return id(lamp_powered);
          then:
            - light.turn_on:
                id: led_matrix
                effect: "Color (Original)"

  - id: click_handler
    mode: restart
    then:
      # Trailing-edge multi-click debounce. The decision window runs only after
      # the latest release; any new press cancels the pending dispatch and the
      # next release starts a fresh window.
      - delay: !lambda return id(touch_click_window_ms);
      - lambda: |-
          char wall_time[32];
          format_log_wall_time(wall_time, sizeof(wall_time));
          ESP_LOGD("touch_button",
                   "click_handler fired at %s window_ms=%u click_count=%d",
                   wall_time,
                   id(touch_click_window_ms),
                   id(click_count));
      - if:
          condition:
            lambda: return id(click_count) == 1;
          then:
            - logger.log: "single click -> lamp_power toggle"
            - switch.toggle: lamp_power
      - if:
          condition:
            lambda: return id(click_count) == 2;
          then:
            - logger.log: "double click -> next effect"
            - script.execute: button_next_effect
      - if:
          condition:
            lambda: return id(click_count) == 3;
          then:
            - logger.log: "triple click -> previous effect"
            - script.execute: button_previous_effect
      - if:
          condition:
            lambda: return id(click_count) == 4;
          then:
            - logger.log: "quad click -> first effect"
            - script.execute: button_first_effect
      - lambda: |-
          char wall_time[32];
          format_log_wall_time(wall_time, sizeof(wall_time));
          ESP_LOGD("touch_button",
                   "reset click_count from %d to 0 at %s",
                   id(click_count),
                   wall_time);
          id(click_count) = 0;

  # GyverLamp2-like hold: 800 ms hold threshold, then brightness changes every 80 ms.
  - id: hold_detector
    mode: single
    then:
      - delay: 800ms
      - lambda: id(touch_long_press) = true;
      - if:
          condition:
            lambda: return id(lamp_powered);
          then:
            - while:
                condition:
                  and:
                    - binary_sensor.is_on: touch_button
                    - lambda: return id(lamp_powered);
                then:
                  - lambda: |-
                      int level = id(lamp_brightness_level);
                      level += id(brightness_up) ? 1 : -1;
                      if (level > 10) level = 10;
                      if (level < 1) level = 1;
                      id(lamp_brightness_level) = level;
                      auto call = id(led_matrix).turn_on();
                      call.set_brightness(lamp_brightness_fraction(level));
                      call.perform();
                  - delay: 80ms

binary_sensor:
  - platform: gpio
    id: touch_button
    name: "Lamp Touch Button"
    # TTP223 OUT -> GPIO27. Touch = HIGH, release = LOW (momentary mode).
    pin:
      number: ${touch_pin}
      mode: INPUT
    filters:
      - delayed_on: 20ms
      - delayed_off: 20ms
    on_press:
      - if:
          condition:
            lambda: return id(click_count) > 0;
          then:
            - lambda: |-
                char wall_time[32];
                format_log_wall_time(wall_time, sizeof(wall_time));
                ESP_LOGD("touch_button",
                         "touch_button on_press at %s cancel pending click dispatch click_count=%d",
                         wall_time,
                         id(click_count));
            - script.stop: click_handler
      - lambda: |-
          char wall_time[32];
          format_log_wall_time(wall_time, sizeof(wall_time));
          ESP_LOGD("touch_button", "touch_button on_press at %s", wall_time);
      - lambda: id(touch_long_press) = false;
      - script.execute: hold_detector
    on_release:
      - lambda: |-
          char wall_time[32];
          format_log_wall_time(wall_time, sizeof(wall_time));
          ESP_LOGD("touch_button",
                   "touch_button on_release at %s long=%d clicks_before=%d",
                   wall_time,
                   id(touch_long_press),
                   id(click_count));
      - script.stop: hold_detector
      - if:
          condition:
            lambda: return id(touch_long_press);
          then:
            - lambda: |-
                char wall_time[32];
                format_log_wall_time(wall_time, sizeof(wall_time));
                ESP_LOGD("touch_button",
                         "long press release at %s: toggling brightness direction",
                         wall_time);
                id(brightness_up) = !id(brightness_up);
                if (id(click_count) != 0) {
                  char cancel_wall_time[32];
                  format_log_wall_time(cancel_wall_time, sizeof(cancel_wall_time));
                  ESP_LOGD("touch_button",
                           "long press release cancels pending click_count=%d at %s",
                           id(click_count),
                           cancel_wall_time);
                  id(click_count) = 0;
                }
          else:
            - lambda: |-
                id(click_count)++;
                char wall_time[32];
                format_log_wall_time(wall_time, sizeof(wall_time));
                ESP_LOGD("touch_button",
                         "short release at %s: click_count=%d",
                         wall_time,
                         id(click_count));
            - script.execute: click_handler

light:
  - platform: esp32_rmt_led_strip
    id: led_matrix
    name: "Ambient Matrix Lamp"
    internal: true
    pin: ${led_pin}
    rmt_channel: 0
    num_leds: 256
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
    # Hard current cap: strip max ~15.36A (256 LEDs x 60mA full white),
    # Hard global ceiling: at full slider brightness the matrix is limited to
    # roughly 66% of raw LED output, keeping PSU load within budget.
    color_correct: [0.50, 0.50, 0.50]
    effects:
      # Internal-only effects remain in firmware, but are intentionally omitted
      # from the user-facing effect list and button cycle.
      - addressable_lambda:
          name: "On/Off: Power Helix"
          update_interval: 15ms
          lambda: |-
            static const ambient_matrix::Matrix matrix(16, 16);
            if (!id(power_transition_active)) {
              if (!id(lamp_powered)) {
                ESPHomeMatrixCanvas(it).clear();
                return;
              }
              PowerTransitionRenderer::render_helix(it, matrix, 1.0f, true);
              return;
            }

            const uint32_t elapsed = millis() - id(power_transition_start_ms);
            float progress = (float) elapsed / (float) id(power_transition_duration_ms);
            if (progress > 1.0f) progress = 1.0f;
            PowerTransitionRenderer::render_helix(it, matrix, progress, id(power_transition_turning_on));

      - addressable_lambda:
          name: "Sunrise"
          update_interval: 15ms
          lambda: |-
            if (!id(sunrise_active)) {
              ESPHomeMatrixCanvas(it).clear();
              return;
            }

            const uint32_t elapsed = millis() - id(sunrise_started_ms);
            const uint32_t ramp_ms = id(sunrise_ramp_duration_ms);
            uint8_t progress = 255;
            if (ramp_ms > 0 && elapsed < ramp_ms) {
              progress = (uint8_t) ((elapsed * 255UL) / ramp_ms);
            }

            int max_level = id(sunrise_max_level);
            if (max_level < 1) max_level = 1;
            if (max_level > 10) max_level = 10;
            const uint8_t max_brightness = (uint8_t) ((max_level * 255) / 10);
            SunriseRenderer::render(it, progress, max_brightness);

      - addressable_lambda:
          name: "Matrix Debug Corners"
          update_interval: 250ms
          lambda: |-
            if (!id(lamp_powered)) { ESPHomeMatrixCanvas(it).clear(); return; }

            // Diagnostic effect: shows the true physical LED#0 origin and
            // serpentine wiring. The matrix has no orientation correction by
            // design — do NOT add any here.
            static const ambient_matrix::Matrix matrix(16, 16);
            ESPHomeMatrixCanvas canvas(it);
            canvas.clear();

            auto draw_block = [&](int start_x, int start_y, ambient_matrix::Rgb color) {
              for (int dy = 0; dy < 2; dy++) {
                for (int dx = 0; dx < 2; dx++) {
                  canvas.set_pixel(matrix.xy(start_x + dx, start_y + dy), color);
                }
              }
            };

            draw_block(0, 0, ambient_matrix::Rgb{255, 0, 0});
            draw_block(14, 0, ambient_matrix::Rgb{0, 255, 0});
            draw_block(0, 14, ambient_matrix::Rgb{0, 0, 255});
            draw_block(14, 14, ambient_matrix::Rgb{255, 255, 0});

      - addressable_lambda:
          name: "Rainbow 2"
          update_interval: 15ms
          lambda: |-
            if (!id(lamp_powered)) { ESPHomeMatrixCanvas(it).clear(); return; }
            static ambient_matrix::EffectEngine engine{ambient_matrix::Matrix(16, 16)};
            if (initial_run) engine.set_effect(ambient_matrix::EffectId::Rainbow);
            engine.set_params({g_effect_speed, g_effect_scale, g_effect_color, (ambient_matrix::PaletteId) g_effect_palette});
            ESPHomeMatrixCanvas canvas(it);
            engine.tick(canvas, millis());

      - addressable_lambda:
