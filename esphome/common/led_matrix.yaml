          id(effect_speed_pending) = (uint8_t)x;
          id(effect_speed_change_ms) = millis();
          id(effect_speed_target_effect) = id(current_effect);
      - script.execute: apply_effect_speed_debounced

  - platform: template
    id: effect_scale
    name: "Effect Scale"
    entity_category: config
    min_value: 0
    max_value: 255
    step: 1
    update_interval: 5s
    lambda: |-
      return (float)g_effect_scale;
    set_action:
      - lambda: |-
          id(effect_scale_pending) = (uint8_t)x;
          id(effect_scale_change_ms) = millis();
          id(effect_scale_target_effect) = id(current_effect);
      - script.execute: apply_effect_scale_debounced

  - platform: template
    id: effect_color
    name: "Effect Color"
    entity_category: config
    min_value: 0
    max_value: 255
    step: 1
    update_interval: 5s
    lambda: |-
      return (float)g_effect_color;
    set_action:
      - lambda: |-
          g_effect_color = (uint8_t)x;
          effect_prefs_save(id(current_effect).c_str(),
                            g_effect_speed,
                            g_effect_scale,
                            g_effect_color,
                            g_effect_palette,
                            g_effect_from_palette);

