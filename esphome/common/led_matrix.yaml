globals:
  # Master power flag, independent from the light's effect — mirrors
  # GyverLamp2's separate "power" vs "preset index" fields, so toggling
  # power never resets the selected effect.
  - id: lamp_powered
    type: bool
    restore_value: true
    initial_value: 'false'
  - id: last_toggle_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: current_effect
    type: std::string
    restore_value: true
    initial_value: '"Color (Original)"'
  - id: click_count
    type: uint8_t
    restore_value: false
    initial_value: '0'
  - id: touch_click_window_ms
    type: uint32_t
    restore_value: false
    initial_value: '500'
  - id: touch_long_press
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: brightness_up
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: lamp_brightness_level
    type: int
    restore_value: true
    initial_value: '8'
  - id: power_transition_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: power_transition_turning_on
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: power_transition_start_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: power_transition_duration_ms
    type: uint32_t
    restore_value: false
    initial_value: '900'
  - id: sunrise_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: sunrise_start_pending
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: sunrise_started_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: sunrise_ramp_duration_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: sunrise_hold_duration_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: sunrise_duration_min
    type: int
    restore_value: true
    initial_value: '20'
  - id: sunrise_hold_min
    type: int
    restore_value: true
    initial_value: '10'
  - id: sunrise_max_level
    type: int
    restore_value: true
    initial_value: '10'
  - id: effect_speed_pending
    type: uint8_t
    restore_value: false
    initial_value: '200'
  - id: effect_scale_pending
    type: uint8_t
    restore_value: false
    initial_value: '100'
  - id: effect_speed_change_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: effect_scale_change_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: effect_speed_target_effect
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: effect_scale_target_effect
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: current_preset
    type: std::string
    restore_value: true
    initial_value: '"Perlin Warm (Original)"'
  # Agent-finished notify flash: remembers the effect and power state to
  # restore after a short green blink triggered from Home Assistant.
  - id: notify_flash_active
    type: bool
    restore_value: false
    initial_value: 'false'
  - id: notify_flash_prev_effect
    type: std::string
    restore_value: false
    initial_value: '""'
  - id: notify_flash_prev_powered
    type: bool
    restore_value: false
    initial_value: 'false'
switch:
  - platform: template
    id: lamp_power
    name: "Lamp Power"
    lambda: |-
      return id(lamp_powered);
    turn_on_action:
      - if:
          condition:
            lambda: return id(sunrise_active);
          then:
            - lambda: |-
                id(sunrise_active) = false;
                id(power_transition_active) = false;
                id(lamp_powered) = true;
            - light.turn_on:
                id: led_matrix
                brightness: !lambda return lamp_brightness_fraction(id(lamp_brightness_level));
                effect: !lambda return id(current_effect);
          else:
            - if:
                condition:
                  lambda: return millis() - id(last_toggle_ms) >= 1000;
                then:
                  - script.execute: run_power_on_transition
    turn_off_action:
      - if:
          condition:
            lambda: return millis() - id(last_toggle_ms) >= 1000;
          then:
            - if:
                condition:
                  lambda: return id(sunrise_active);
                then:
                  - script.execute: stop_sunrise
                else:
                  - script.execute: run_power_off_transition
  - platform: template
    id: lamp_auto_rotate
    name: "Lamp Auto Rotate"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_sunday_enabled
    name: "Sunrise Sunday"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_monday_enabled
    name: "Sunrise Monday"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_tuesday_enabled
    name: "Sunrise Tuesday"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_wednesday_enabled
    name: "Sunrise Wednesday"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_thursday_enabled
    name: "Sunrise Thursday"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_friday_enabled
    name: "Sunrise Friday"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: sunrise_saturday_enabled
    name: "Sunrise Saturday"
    entity_category: config
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
  - platform: template
    id: effect_from_palette
    name: "Effect From Palette"
    entity_category: config
    lambda: |-
      return g_effect_from_palette != 0;
    turn_on_action:
      - lambda: |-
          g_effect_from_palette = 1;
          effect_prefs_save(id(current_effect).c_str(),
                            g_effect_speed,
                            g_effect_scale,
                            g_effect_color,
                            g_effect_palette,
                            g_effect_from_palette);
    turn_off_action:
      - lambda: |-
          g_effect_from_palette = 0;
          effect_prefs_save(id(current_effect).c_str(),
                            g_effect_speed,
                            g_effect_scale,
                            g_effect_color,
                            g_effect_palette,
                            g_effect_from_palette);

select:
  - platform: template
    id: lamp_preset
    name: "Lamp Preset"
    options:
      - "Perlin Warm (Original)"
      - "Perlin Ocean"
      - "Perlin Forest"
      - "Perlin Rainbow"
      - "Perlin Party"
      - "Fire"
      - "Fire 2020"
      - "Confetti"
      - "Particles"
      - "Tornado"
      - "Color Shift"
      - "Scanner"
      - "Gradient"
    lambda: |-
      return id(current_preset);
    set_action:
      - lambda: |-
          id(sunrise_active) = false;
          id(power_transition_active) = false;
          id(current_preset) = x;
          g_current_preset = x;
          id(lamp_powered) = true;
          preset_prefs_load(x.c_str());
          const Preset* p = find_preset(x.c_str());
          std::string effect_name = p ? p->effect : "Color (Original)";
          id(current_effect) = effect_name;
          id(effect_speed).publish_state((float)g_effect_speed);
          id(effect_scale).publish_state((float)g_effect_scale);
          id(effect_palette).publish_state((float)g_effect_palette);
          id(lamp_effect).publish_state(effect_name);
      - light.turn_on:
          id: led_matrix
          effect: !lambda return id(current_effect);

  - platform: template
    id: lamp_effect
    name: "Lamp Effect"
    internal: true
    options:
      - "Color (Original)"
      - "Color Shift (Original)"
      - "Gradient (Original)"
      - "Perlin (Original)"
      - "Particles (Original)"
      - "Fire Classic"
      - "Fire (Original)"
      - "Confetti (Original)"
      - "Tornado (Original)"
      - "Benchmark Circle"
      - "Benchmark Ball"
      - "Benchmark Sine"
    lambda: |-
      return id(current_effect);
    set_action:
      - lambda: |-
          id(sunrise_active) = false;
          id(power_transition_active) = false;
          id(current_effect) = x;
          id(lamp_powered) = true;
          effect_prefs_load(x.c_str());
          id(effect_speed).publish_state((float)g_effect_speed);
          id(effect_scale).publish_state((float)g_effect_scale);
          id(effect_color).publish_state((float)g_effect_color);
          id(effect_palette).publish_state((float)g_effect_palette);
          id(effect_from_palette).publish_state(g_effect_from_palette != 0);
      - light.turn_on:
          id: led_matrix
          effect: !lambda return x;

