globals:
  # Master power flag, independent from the light's effect — mirrors
  # GyverLamp2's separate "power" vs "preset index" fields, so toggling
  # power never resets the selected effect.
  - id: lamp_powered
    type: bool
    restore_value: false
    initial_value: 'true'
  - id: last_toggle_ms
    type: uint32_t
    restore_value: false
    initial_value: '0'
  - id: current_effect
    type: std::string
    restore_value: false
    initial_value: '"Color Scanner"'
  - id: click_count
    type: uint8_t
    restore_value: false
    initial_value: '0'
  - id: touch_long_press
    type: bool
    restore_value: false
    initial_value: 'false'
  # Persisted so ramp direction survives reboot.
  - id: brightness_up
    type: bool
    restore_value: true
    initial_value: 'true'

switch:
  - platform: template
    id: lamp_power
    name: "Lamp Power"
    lambda: |-
      return id(lamp_powered);
    turn_on_action:
      - if:
          condition:
            lambda: return millis() - id(last_toggle_ms) >= 1000;
          then:
            - lambda: |-
                id(last_toggle_ms) = millis();
                id(lamp_powered) = true;
            - light.turn_on:
                id: led_matrix
                effect: !lambda return id(current_effect);
    turn_off_action:
      - if:
          condition:
            lambda: return millis() - id(last_toggle_ms) >= 1000;
          then:
            - lambda: |-
                id(last_toggle_ms) = millis();
                id(lamp_powered) = false;

select:
  - platform: template
    id: lamp_effect
    name: "Lamp Effect"
    optimistic: true
    initial_option: "Color Scanner"
    options:
      - "Color Scanner"
      - "Blue Scanner"
      - "Plasma"
      - "Aurora"
      - "Neon Rings"
      - "Kaleidoscope"
      - "Digital Rain"
      - "Comet Shower"
      - "Starfield"
      - "Cosmic Nebula"
      - "Wormhole"
      - "Orbital Dance"
      - "Solar Storm"
      - "Pulsar"
      - "Starry Sky"
      - "Asteroid Impact"
      - "Pac-Man Orbit"
      - "Space Police"
      - "Purple Meteor Shower"
      - "Light Speed"
      - "Supernova"
      - "Flight to Mars"
      - "Singularity"
      - "Relic Radiation"
      - "Ocean Waves"
      - "Lava Lamp"
      - "Rainbow"
      - "Color"
      - "Color Shift"
      - "Gradient"
      - "Perlin"
      - "Particles"
      - "Campfire"
      - "Fire"
      - "Fire 2020"
      - "Confetti"
      - "Tornado"
    set_action:
      - lambda: |-
          id(current_effect) = x;
          id(lamp_powered) = true;
      - light.turn_on:
          id: led_matrix
          effect: !lambda return x;

number:
  - platform: template
    id: lamp_brightness
    name: "Lamp Brightness"
    min_value: 1
    max_value: 255
    step: 1
    lambda: |-
      return (int)(id(led_matrix).current_values.get_brightness() * 255.0f);
    set_action:
      - light.turn_on:
          id: led_matrix
          brightness: !lambda return x / 255.0f;

# Rotate forever while the lamp is on. cycle: true wraps the final effect back
# to Color Scanner instead of stopping at the end of the options list.
interval:
  - interval: 1min
    then:
      - if:
          condition:
            lambda: return id(lamp_powered);
          then:
            - select.next:
                id: lamp_effect
                cycle: true

# Apply the first tap immediately so effect browsing feels responsive. If a
# second tap arrives within 350 ms, two reverse steps correct the net result
# from "next" to "previous" relative to the effect active before the first tap.
script:
  - id: click_handler
    mode: restart
    then:
      - if:
          condition:
            lambda: return id(click_count) == 1;
          then:
            - select.next:
                id: lamp_effect
                cycle: true
            - delay: 350ms
            - lambda: id(click_count) = 0;
          else:
            - if:
                condition:
                  lambda: return id(click_count) == 2;
                then:
                  - select.previous:
                      id: lamp_effect
                      cycle: true
                  - select.previous:
                      id: lamp_effect
                      cycle: true
            - lambda: id(click_count) = 0;

  # Replaces on_hold (removed in ESPHome 2026.x): waits 800 ms then ramps brightness.
  - id: hold_detector
    mode: single
    then:
      - delay: 800ms
      - lambda: id(touch_long_press) = true;
      - if:
          condition:
            lambda: return id(lamp_powered);
          then:
            - while:
                condition:
                  and:
                    - binary_sensor.is_on: touch_button
                    - lambda: return id(lamp_powered);
                then:
                  - lambda: |-
                      float b = id(led_matrix).current_values.get_brightness();
                      const float step = 5.0f / 255.0f;
                      b += id(brightness_up) ? step : -step;
                      if (b >= 1.0f) {
                        b = 1.0f;
                        id(brightness_up) = false;
                      } else if (b <= 1.0f / 255.0f) {
                        b = 1.0f / 255.0f;
                        id(brightness_up) = true;
                      }
                      auto call = id(led_matrix).turn_on();
                      call.set_brightness(b);
                      call.perform();
                  - delay: 80ms

binary_sensor:
  - platform: gpio
    id: touch_button
    name: "Lamp Touch Button"
    # TTP223 OUT -> GPIO27. Touch = HIGH, release = LOW (momentary mode).
    pin:
      number: ${touch_pin}
      mode: INPUT
    filters:
      - delayed_on: 30ms
      - delayed_off: 30ms
    on_press:
      - lambda: id(touch_long_press) = false;
      - script.execute: hold_detector
    on_release:
      - script.stop: hold_detector
      - if:
          condition:
            lambda: return !id(touch_long_press);
          then:
            - lambda: id(click_count)++;
            - script.execute: click_handler

light:
  - platform: esp32_rmt_led_strip
    id: led_matrix
    name: "Ambient Matrix Lamp"
    internal: true
    pin: ${led_pin}
    num_leds: 256
    chipset: WS2812
    rgb_order: GRB
    default_transition_length: 0s
    # Hard current cap: strip max ~15.36A (256 LEDs x 60mA full white),
    # PSU is 5V 12A. color_correct scales peak draw to ~5A.
    color_correct: [0.32, 0.32, 0.32]
    effects:
      - addressable_lambda:
          name: "Rainbow"
          update_interval: 30ms
          lambda: |-
            if (!id(lamp_powered)) { ESPHomeMatrixCanvas(it).clear(); return; }
            static ambient_matrix::EffectEngine engine{ambient_matrix::Matrix(16, 16)};
            if (initial_run) engine.set_effect(ambient_matrix::EffectId::Rainbow);
            ESPHomeMatrixCanvas canvas(it);
            engine.tick(canvas, millis());

      - addressable_lambda:
          name: "Color"
          update_interval: 30ms
          lambda: |-
